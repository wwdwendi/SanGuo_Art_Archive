image: node:22-alpine

stages:
  - validate
  - build
  - deploy

default:
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

lint:
  stage: validate
  allow_failure: true
  script:
    - npm run lint

build:
  stage: build
  script:
    - npm run build
  artifacts:
    when: on_success
    expire_in: 7 days
    paths:
      - dist/

deploy_local:
  stage: deploy
  needs:
    - build
  before_script: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - bash scripts/deploy-local.sh
