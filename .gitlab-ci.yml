image: node:22-alpine

stages:
  - validate
  - build
  - deploy

default:
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

lint:
  stage: validate
  allow_failure: true
  script:
    - npm run lint

build:
  stage: build
  script:
    - npm run build
  artifacts:
    when: on_success
    expire_in: 7 days
    paths:
      - dist/

deploy_local:
  stage: deploy
  needs:
    - build
  resource_group: x28-art-archive-local
  variables:
    GIT_STRATEGY: none
    ART_ARCHIVE_DEPLOY_ROOT: "/home/x28admin/workspace/X28_Art_Archive"
    VITE_APP_BASE: "/art_archive/"
  before_script: []
  tags:
    - x28db-gitlab-runner
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - cd "$ART_ARCHIVE_DEPLOY_ROOT"
    - ./scripts/deploy-local.sh
